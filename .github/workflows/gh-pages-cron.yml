name: Update Dashboard Schedule

on:
  schedule:
    - cron: '30 20 * * 1-5' # Lunes a Viernes a las 17:30 ARG (20:30 UTC)
  workflow_dispatch: # Permite ejecución manual por si acaso

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Dashboard Generator
      env:
        SCREENERMATIC_EMAIL: ${{ secrets.SCREENERMATIC_EMAIL }}
        SCREENERMATIC_PASSWORD: ${{ secrets.SCREENERMATIC_PASSWORD }}
      run: |
        # Solo ejecuta el generador principal del dashboard (no-interactivo)
        python src/utils/generar_dashboard.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add data/ index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: Update dashboard data and UI" && git push)
